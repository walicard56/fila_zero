{% extends "base.html" %}
{% block title %}Entrar · FilaZero{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-12">
  <div class="bg-white rounded-2xl card p-6">
    <h2 class="text-xl font-bold mb-1">Acesso da equipe</h2>
    <p class="text-sm text-slate-500 mb-4">Use a senha fornecida pelo administrador.</p>

    {% if erro %}
      <div class="bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-md p-3 mb-3">
        Senha incorreta. Tente novamente.
      </div>
    {% endif %}

    <form action="/login" method="post" class="space-y-3">
      <input type="password" name="senha" required autofocus
             placeholder="Senha"
             class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500" />
      <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg">
        Entrar
      </button>
    </form>
  </div>
</div>
{% endblock %}
